# Builds prebuilt `corvid` binaries on every v*.*.* tag AND on every
# push to `main` (nightly channel, slice
# `35V2-P33-release-nightly-channel`) and uploads archives to GitHub
# Releases. The install/ scripts download these archives via the
# `releases/latest/download/...` URL (stable channel, the `v*.*.*`
# tags) or `releases/tags/nightly-YYYY-MM-DD-<sha>/...` (nightly
# channel, the main-branch pushes). Without this workflow the
# installer falls back to a slow `cargo install`.
#
# Release-channel naming follows `docs/release-policy.md` — stable
# releases are `v<semver>` (e.g. `v0.0.1`) and nightly releases are
# `nightly-YYYY-MM-DD-<short-sha>` (e.g. `nightly-2026-06-04-d23d381`).
# Nightly releases are marked as pre-releases so GitHub's "latest"
# pointer keeps pointing at the most recent stable tag — the install
# script's fast path `releases/latest/download/...` continues to mean
# "the most recent stable release," not "the most recent push to
# main."

name: release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    target: x86_64-unknown-linux-gnu,  archive: tar.gz }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu, archive: tar.gz }
          - { os: macos-latest,     target: x86_64-apple-darwin,       archive: tar.gz }
          - { os: macos-latest,     target: aarch64-apple-darwin,      archive: tar.gz }
          - { os: windows-latest,   target: x86_64-pc-windows-msvc,    archive: zip    }
          - { os: windows-11-arm,   target: aarch64-pc-windows-msvc,   archive: zip    }

    steps:
      - uses: actions/checkout@v4

      # Compute the release tag + channel + prerelease flag from
      # the workflow trigger. Three cases:
      #   - push to a `v*.*.*` tag → stable channel; tag = the
      #     pushed tag; prerelease = false; "latest" pointer
      #     advances.
      #   - push to `main` → nightly channel; tag =
      #     `nightly-YYYY-MM-DD-<short-sha>`; prerelease = true;
      #     "latest" pointer does NOT advance so the install
      #     script's fast path keeps meaning "latest stable."
      #   - `workflow_dispatch` → treats as nightly (manual
      #     nightly cut from main).
      # Slice `35V2-P33-release-nightly-channel`.
      - name: Compute release tag + channel
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          ref="${GITHUB_REF:-}"
          short_sha="$(git rev-parse --short HEAD)"
          date_utc="$(date -u +%Y-%m-%d)"
          if [[ "$ref" == refs/tags/v* ]]; then
            release_tag="${ref#refs/tags/}"
            channel="stable"
            prerelease="false"
          else
            release_tag="nightly-${date_utc}-${short_sha}"
            channel="nightly"
            prerelease="true"
          fi
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "channel=$channel"         >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease"   >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha"     >> "$GITHUB_OUTPUT"
          echo "commit_date=$date_utc"    >> "$GITHUB_OUTPUT"
          echo "Computed: tag=$release_tag channel=$channel prerelease=$prerelease commit_date=$date_utc"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ steps.tag.outputs.channel }}

      # Build corvid-runtime FIRST so cargo emits the `staticlib`
      # crate-type output that the cdylib link + native-tier
      # build paths both require. Cargo only emits all crate-type
      # outputs when the crate is the build TARGET, not when it's
      # pulled in as a dep — the same constraint that bit
      # `effect-system-gates` at `fcf4ce4` and `app-deploy-smoke`
      # at `0fc9d89`. Without this step, `libcorvid_runtime.a`
      # never lands and the install script can't ship it.
      - name: Build corvid-runtime (must precede CLI build so staticlib lands)
        run: cargo build --release --locked --target ${{ matrix.target }} -p corvid-runtime

      # `CORVID_BUILD_SHA` + `CORVID_BUILD_DATE` are env-var
      # overrides honored by `crates/corvid-cli/build.rs` (slice
      # `35V2-P33-version-output-sha`). Setting them here lets
      # the workflow inject canonical values rather than letting
      # build.rs run its own `git rev-parse` (which would
      # otherwise pick up the checkout-action's SHA strategy
      # depending on how the runner cloned).
      - name: Build
        env:
          CORVID_BUILD_SHA: ${{ steps.tag.outputs.short_sha }}
          CORVID_BUILD_DATE: ${{ steps.tag.outputs.commit_date }}
        run: cargo build --release --locked --target ${{ matrix.target }} -p corvid-cli

      - name: Stage artifact
        shell: bash
        run: |
          name="corvid-${{ matrix.target }}"
          stage="dist/$name"
          mkdir -p "$stage/bin" "$stage/lib"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/corvid.exe" "$stage/bin/"
          else
            cp "target/${{ matrix.target }}/release/corvid" "$stage/bin/"
          fi
          # Stage the runtime staticlib alongside the bin under
          # `$stage/lib/` so post-install discovery via
          # `staticlib_discovery::SiblingLibDir` (which checks
          # `exe_parent.parent()/lib/<name>` = `$CORVID_HOME/lib/<name>`
          # when the bin lives at `$CORVID_HOME/bin/corvid`) finds
          # it without env-var setup. Slice
          # `35V2-P33-release-archive-staticlib`. Without this the
          # `cargo install`-shape friction the first 33M trial
          # reviewer hit ships in every release.
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/corvid_runtime.lib" "$stage/lib/"
          else
            cp "target/${{ matrix.target }}/release/libcorvid_runtime.a" "$stage/lib/"
          fi
          [ -d std ]            && cp -R std            "$stage/std"            || true
          # Slice 33Q6 (maintainer-as-reviewer-2026-06-05 P1.1): ship the
          # `corvid_runtime` Python package alongside the binary so the
          # `corvid serve` tools.py autoloader (33Q1b) finds it without
          # the reviewer needing to set PYTHONPATH or `pip install`. The
          # autoloader's `find_bundled_corvid_runtime` resolves this at
          # `<binary_parent>/../runtime-py/` — for a binary installed at
          # `$CORVID_HOME/bin/corvid`, that's `$CORVID_HOME/runtime-py/`.
          # Pre-33Q6 the scaffold's "Next steps" output told reviewers to
          # `pip install corvid-runtime`, but the package isn't on PyPI;
          # every release-installed reviewer's first attempt at Surface 3
          # of the trial died with `ModuleNotFoundError`.
          [ -d runtime/python ] && cp -R runtime/python "$stage/runtime-py" || true
          [ -f LICENSE-MIT ]    && cp    LICENSE-MIT    "$stage/LICENSE-MIT"    || true
          [ -f LICENSE-APACHE ] && cp    LICENSE-APACHE "$stage/LICENSE-APACHE" || true
          [ -f README.md ]      && cp    README.md      "$stage/README.md"      || true

      - name: Archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd dist && tar -czf "corvid-${{ matrix.target }}.tar.gz" "corvid-${{ matrix.target }}"

      - name: Archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $name = "corvid-${{ matrix.target }}"
          Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.zip" -Force

      # Stable runs (push to `v*.*.*`) upload to the existing
      # release for that tag and advance the "latest" pointer.
      # Nightly runs (push to `main` or workflow_dispatch from
      # main) create / upload to a release named
      # `nightly-YYYY-MM-DD-<sha>`, marked as a pre-release so
      # GitHub's "latest" pointer stays on the most recent
      # stable. The install script's fast path
      # `releases/latest/download/...` keeps meaning "latest
      # stable"; the nightly channel is opt-in via
      # `CORVID_VERSION=nightly` (slice
      # `35V2-P33-install-script-nightly`) which resolves to
      # `releases/tags/nightly-<date>-<sha>/download/...`.
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          name: ${{ steps.tag.outputs.release_tag }}
          files: dist/corvid-${{ matrix.target }}.${{ matrix.archive }}